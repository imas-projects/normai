<VirtualHost *:80>
    ServerName 34.254.185.243
    ServerAlias 34.254.185.243

    WSGIDaemonProcess normai python-home=/home/ubuntu/normai-env python-path=/home/ubuntu/normai/velzon
    WSGIProcessGroup normai
    WSGIScriptAlias / /home/ubuntu/normai/velzon/wsgi.py

    # Archivos estáticos
    Alias /static /home/ubuntu/normai/staticfiles
    <Directory /home/ubuntu/normai/staticfiles>
        Require all granted
    </Directory>

    # Permitir acceso al directorio del proyecto
    <Directory /home/ubuntu/normai>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

</VirtualHost>


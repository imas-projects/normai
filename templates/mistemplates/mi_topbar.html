{% load static %}
{% block header %}
        <header id="page-topbar">
            <div class="layout-width">
                <div class="navbar-header">
                    <!-- LOGO -->
<div class="row justify-content-start">
  <h1 class="text-white py-3 d-flex align-items-center">
    <i class='bx bx-brain me-2'></i> NormAI
  </h1>
</div>

                    <div class="row justify-content-end py-3">
                        <button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle" data-toggle="fullscreen">
                            <i class='bx bx-fullscreen fs-22'></i>
                        </button>
                        <a href="{% url 'pages:wellcome_view' %}" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle bx bx-home fs-22"></a>
                        <a href="{% url 'admin:index' %}" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle  bx bx-shield fs-22"></a>

                        {% if user.is_authenticated %}
                            <a href="{% url 'authentication:authentication_log_out' %}" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle bx bx-log-out-circle fs-22"></a>
                        
                            <!--<div class="text-light ms-auto">Sesión iniciada como {{user.first_name}} {{user.last_name}}</div>-->
                        {% else %}
                            <a href="{% url 'authentication:authentication_sign_in' %}" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle bx bx-user fs-22"></a>
                        {% endif %}
                        </div>
                    </div>
                    
                </div>
            </div>
        </header>
{% endblock header %}

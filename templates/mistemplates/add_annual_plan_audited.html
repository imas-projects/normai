{% load static %}
<div class="container mt-4">
  <h2>Agregar Auditado al Plan Anual</h2>
  <form method="post" action="{% url 'audits:add_annual_plan_audited' %}" id="addAnnualPlanAuditedForm">
    {% csrf_token %}

    <!-- Plan Anual -->
    <div class="mb-3">
      <label>Plan:</label>
      {{ form.annual_plan }}
      {% if form.annual_plan.errors %}
        <div class="text-danger small">{{ form.annual_plan.errors }}</div>
      {% endif %}
    </div>

    <!-- Selector de usuario (auditado) -->
    <div class="mb-3">
      <label>Auditado:</label>
      {{ form.user }}
      {% if form.user.errors %}
        <div class="text-danger small">{{ form.user.errors }}</div>
      {% endif %}
    </div>

    <!-- Botón final -->
    <button type="submit" class="btn btn-success">Guardar</button>
  </form>
</div>

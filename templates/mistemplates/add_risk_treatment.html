{% load static %}
<div class="container">
    <form method="post" id="add-risk-treatment-form" action="{% url 'risks:add_risk_treatment' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label>Riesgo:</label>
            {{ form.risk }}
        </div>

        <!-- Botón para obtener sugerencias IA -->
        <div class="mb-3">
            <button type="button" id="getTreatmentSuggestionBtn" class="btn btn-info">Obtener sugerencias IA</button>
        </div>
        
        <div id="treatmentSuggestionContainer" class="mt-4" style="display:none;">
            <strong>Sugerencias de la IA:</strong>
            <div id="treatmentSuggestionList" class="mt-2"></div>
        </div>

        
        <div class="mb-3">
            <label>Acción del Tratamiento:</label>
            {{ form.treatment_action }}
        </div>
        

        <div class="mb-3">
            <label>Responsable:</label>
            <!-- Mejor presentación para select multiple -->
<select id="id_responsible" name="{{ form.responsible.name }}"
        multiple data-choices data-choices-removeItem class="form-select">
    {% for option in form.responsible.field.queryset %}
        <option value="{{ option.pk }}"
            {% if option.pk in form.responsible.value %}selected{% endif %}
        >{{ option }}</option>
    {% endfor %}
</select>

        </div>

        <div class="mb-3">
            <label>Fecha Objetivo:</label>
            {{ form.target_date }}
        </div>
        <div class="mb-3">
            <label>Fecha Actual:</label>
            {{ form.actual_date }}
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
    </form>


</div>

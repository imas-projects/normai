{% load static %}
<div class="container">
    <form method="post" id="edit-reevaluation-form" action="{% url 'risks:edit-reevaluation' reevaluation.id %}">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.risk.label_tag }}
            {{ form.risk }}
        </div>
        <div class="mb-3">
            {{ form.severity.label_tag }}
            {{ form.severity }}
        </div>
        <div class="mb-3">
            {{ form.occurrence.label_tag }}
            {{ form.occurrence }}
        </div>
        <div class="mb-3">
            {{ form.detection.label_tag }}
            {{ form.detection }}
        </div>
        <div class="mb-3">
            {{ form.risk_level.label_tag }}
            {{ form.risk_level }}
        </div>
        <button type="submit" class="btn btn-success">Save</button>
    </form>
</div>

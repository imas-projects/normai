{% load static %}
<div class="container">
    <form method="post" id="edit-contingency-plan-form" action="{% url 'risks:edit-contingency-plan' plan.id %}">
        {% csrf_token %}
        <div class="mb-3">
            <label>Riesgo:</label>
            {{ form.risk }}
        </div>
        <div class="mb-3">
            <label>Acciones de Contingencia:</label>
            {{ form.contingency_actions }}
        </div>
        <div class="mb-3">
            <label>Responsable:</label>
            {{ form.responsible }}
        </div>
        <div class="mb-3">
            <label>Comunicar a:</label>
            {{ form.communicate_to }}
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
    </form>
</div>

{% load static %}
<div class="container">
    <form method="post" action="{% url 'audits:add_audit_program_header' %}" id="add-audit-program-header-form">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.objective.label_tag }}
            {{ form.objective }}
        </div>
        <div class="mb-3">
            {{ form.scope.label_tag }}
            {{ form.scope }}
        </div>
        <div class="mb-3">
            {{ form.audit_criteria.label_tag }}
            {{ form.audit_criteria }}
        </div>
        <div class="mb-3">
            {{ form.security_standards.label_tag }}
            {{ form.security_standards }}
        </div>
        <button type="submit" class="btn btn-success">Save</button>
    </form>
</div>

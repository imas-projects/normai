{% load static %}
<div class="container">
    <form method="post" id="add-risk-identification-form" action="{% url 'risks:add_risk_identification' %}">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.area.label_tag }}
            {{ form.area }}
        </div>
        <div class="mb-3">
            {{ form.activity_name.label_tag }}
            {{ form.activity_name }}
        </div>

        <div class="mb-3">
            <button type="button" id="getSuggestionBtn" class="btn btn-info">Obtener sugerencias IA</button>
        </div>

        <div class="mb-3">
            {{ form.identified_risk.label_tag }}
            {{ form.identified_risk }}
        </div>
        <div class="mb-3">
            {{ form.consequences.label_tag }}
            {{ form.consequences }}
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
    </form>

    <div id="suggestionContainer" class="mt-4" style="display:none;">
        <strong>Sugerencias de la IA:</strong>
        <div id="suggestionList" class="mt-2"></div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const suggestionBtn = document.getElementById("getSuggestionBtn");
    const suggestionContainer = document.getElementById("suggestionContainer");
    const suggestionList = document.getElementById("suggestionList");

    suggestionBtn.addEventListener("click", function() {
        const area = document.getElementById("id_area").value;
        const activity = document.getElementById("id_activity_name").value;

        if (!area || !activity) {
            alert("Por favor, rellena Área y Nombre de Actividad antes.");
            return;
        }

        fetch(`{% url 'risks:get_suggestions' %}?area_name=${encodeURIComponent(area)}&activity_name=${encodeURIComponent(activity)}`)
            .then(response => response.json())
            .then(data => {
                suggestionList.innerHTML = ""; 

                if (data.length === 0) {
                    alert("No se encontraron sugerencias.");
                    return;
                }

                suggestionContainer.style.display = "block";

                data.forEach((suggestion, index) => {
                    const risk = suggestion.identified_risk || "(sin riesgo)";
                    const consequences = suggestion.consequences || "(sin consecuencias)";

                    const card = document.createElement("div");
                    card.className = "card mb-2";
                    card.innerHTML = `
                        <div class="card-body">
                            <strong>Riesgo ${index + 1}:</strong> ${risk}<br>
                            <strong>Consecuencias:</strong> ${consequences}<br>
                            <button type="button" class="btn btn-outline-primary btn-sm mt-2">Usar esta sugerencia</button>
                        </div>
                    `;

                    const useBtn = card.querySelector("button");
                    useBtn.addEventListener("click", function() {
                        document.getElementById("id_identified_risk").value = risk;
                        document.getElementById("id_consequences").value = consequences;
                        suggestionContainer.style.display = "none";
                    });

                    suggestionList.appendChild(card);
                });
            })
            .catch(() => {
                alert("Error al obtener sugerencias IA.");
            });
    });
});
</script>

{% load static %}

<div class="container">
    <form method="post" action="{% url 'audits:add_requirement' %}" id="add-requirement-form">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.new_requirement_name.label_tag }} 
            {{ form.new_requirement_name }}  
        </div>
        <div class="mb-3">
            {{ form.parent.label_tag }} 
            {{ form.parent }}  
        </div>
        <button type="submit" class="btn btn-success">Save</button>
    </form>
</div>

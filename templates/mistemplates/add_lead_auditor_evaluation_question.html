{% load static %}
<div class="container mt-4">
  <form method="post" action="{% url 'audits:add_lead_auditor_evaluation_question' %}">
    {% csrf_token %}

    <div class="mb-3">
      <label>Pregunta:</label>
      {{ form.question_text }}
      {% if form.question_text.errors %}
        <div class="text-danger small">{{ form.question_text.errors }}</div>
      {% endif %}
    </div>

    <div class="mb-3">
      <label>Tipo:</label>
      {{ form.type }}
      {% if form.type.errors %}
        <div class="text-danger small">{{ form.type.errors }}</div>
      {% endif %}
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
  </form>
</div>

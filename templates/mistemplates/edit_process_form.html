<form method="post" id="edit-process-form-{{ process.id }}" action="{% url 'processes:edit' process.id %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Save</button>
</form>

<script>
document.getElementById("edit-process-form-{{ process.id }}").addEventListener("submit", function (e) {
    e.preventDefault();
    const form = this;
    const formData = new FormData(form);
    fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
        }
    }).then(response => response.json())
      .then(data => {
        if (data.message) {
            alert(data.message);
            location.reload(); 
        } else if (data.errors) {
            alert("Error: " + JSON.stringify(data.errors));
        }
    }).catch(error => console.error(error));
});
</script>
